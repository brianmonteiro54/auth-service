# ==============================================================================
# AUTH SERVICE - EXTERNAL SECRETS
# ==============================================================================
# Descrição: Integração com AWS Secrets Manager para credenciais do RDS
# ==============================================================================

# # ------------------------------------------------------------------------------
# # Secret - Credenciais AWS (para o External Secrets Operator)
# # ------------------------------------------------------------------------------
# apiVersion: v1
# kind: Secret
# metadata:
#   name: aws-credentials
#   namespace: togglemaster-auth
#   labels:
#     app.kubernetes.io/name: auth-service
#     app.kubernetes.io/component: auth
#     app.kubernetes.io/part-of: togglemaster
# type: Opaque
# data:
#   access-key: ${AWS_ACCESS_KEY_BASE64}
#   secret-access-key: ${AWS_SECRET_KEY_BASE64}
#   session-token: ${AWS_SESSION_TOKEN_BASE64}
---
# ------------------------------------------------------------------------------
# SecretStore - Conexão com AWS Secrets Manager
# ------------------------------------------------------------------------------
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secretsmanager-us-east-1
  namespace: togglemaster-auth
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/component: auth
    app.kubernetes.io/part-of: togglemaster
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            key: access-key
          secretAccessKeySecretRef:
            name: aws-credentials
            key: secret-access-key
          sessionTokenSecretRef:
            name: aws-credentials
            key: session-token

---
# ------------------------------------------------------------------------------
# ExternalSecret - Credenciais do RDS
# ------------------------------------------------------------------------------
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-service-rds
  namespace: togglemaster-auth
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/component: auth
    app.kubernetes.io/part-of: togglemaster
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager-us-east-1
    kind: SecretStore
  target:
    name: auth-service-rds
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: rds!db-60db3cc5-b614-471b-a41a-1bfa557a8dd9
        property: username
    - secretKey: password
      remoteRef:
        key: rds!db-60db3cc5-b614-471b-a41a-1bfa557a8dd9
        property: password
